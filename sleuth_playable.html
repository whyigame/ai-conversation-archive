  print(14, left, "(R) Random Number Seed:", 0x07);
  print(14, valCol, String(SEED), 0x0f);
  print(16, left, "(I) Review Instructions", 0x07);
  print(17, left, "(L) Load a Custom House", 0x07);
  // the guest list panel: whoever will attend the party
  const GL = 48, GR = 79, GT = 8, GB = 18;
  for (let c = GL + 1; c < GR; c++) { put(GT, c, "─", 0x0f); put(GB, c, "─", 0x0f); }
  for (let r = GT + 1; r < GB; r++) { put(r, GL, "│", 0x0f); put(r, GR, "│", 0x0f); }
  put(GT, GL, "┌", 0x0f); put(GT, GR, "┐", 0x0f);
  put(GB, GL, "└", 0x0f); put(GB, GR, "┘", 0x0f);
  print(GT + 1, GL + 2, "Guest List", 0x0b);
  const cast = menuCast();
  for (let i = 0; i < Math.min(7, cast.length); i++) {
    const p = cast[i];
    const full = (p.first + " " + (p.last || "")).trim();
    const nick = p.nick || p.first;
    const line = `${i + 1}. ${full}` + (nick !== p.first ? ` (${nick})` : "");
    print(GT + 3 + i, GL + 2, line.slice(0, GR - GL - 3), 0x07);
  }
  centre(21, " PRESS A KEY TO CHOOSE ", 0x70);
  centre(23, "Copyright (C) 1983 by Eric N. Miller and Norland Software", 0x08);
  centre(24, "remastered 2026 · Claude & Jeromai", 0x08);
  render();
}

function drawNames() {
  const n = ui.names;
  clearScreen(0x07);
  centre(3, "P E R S O N A L I Z E D   S L E U T H", 0x0f);
  centre(6, `SUSPECT # ${n.idx + 1}`, 0x0f);
  print(9,  18, "Enter first name:", 0x07);
  print(9,  38, n.field === 0 ? n.buffer + "_" : n.first, n.field === 0 ? 0x70 : 0x07);
  print(11, 18, "Enter last name:", 0x07);
  print(11, 38, n.field === 1 ? n.buffer + "_"
              : (n.field > 1 ? (n.last || "—") : ""),
        n.field === 1 ? 0x70 : 0x07);
  print(13, 18, "Enter nickname:", 0x07);
  if (n.field === 2) print(13, 38, n.buffer + "_", 0x70);
  centre(16, "(seven names: six suspects and one victim!)", 0x08);
  centre(17, "Enter accepts · blank keeps the original · a lone space = no last name", 0x08);
  centre(18, "blank nickname = first name · Esc abandons", 0x08);
  if (n.dup) centre(20, "(names must be distinct — they are how the parser knows who's who)", 0x0c);
  render();
}

function drawInstructions() {
  clearScreen(0x07);
  const page = window.SLEUTH_INSTRUCTIONS[ui.instrPage] || "";
  let r = 2;
  for (const para of page.split("\n")) {
    print(r++, 6, para.slice(0, COLS - 12), 0x07);
    if (r > 22) break;
  }
  centre(23, ` PRESS ANY KEY TO CONTINUE (${ui.instrPage + 1}/` +
             `${window.SLEUTH_INSTRUCTIONS.length}) `, 0x70);
  render();
}

function drawLoading() {
  clearScreen(0x07);
  print(12, 5, "It is a dark and stormy night.  A murder is being committed ...", 0x07);
  render();
}

function startGame() {
  ui.mode = "game";
  state.houseIdx = ui.houseIdx;
  scatter();
  spawn(false);
}

function uiEnter(mode) {
  if (ui.timer) { clearTimeout(ui.timer); ui.timer = null; }
  ui.mode = mode;
  if (mode === "title") drawTitle();
  else if (mode === "menu") drawMenu();
  else if (mode === "instructions") { ui.instrPage = 0; drawInstructions(); }
  else if (mode === "names") {
    ui.names = { idx: 0, field: 0, buffer: "", first: "", list: [] };
    drawNames();
  } else if (mode === "loading") {
    drawLoading();
    if (window.SLEUTH_FAST) { startGame(); return; }   // sync harnesses
    ui.timer = setTimeout(() => { if (ui.mode === "loading") startGame(); },
                          2000);
  }
}

function uiKey(k) {
  if (ui.mode === "title") { uiEnter("menu"); return; }
  if (ui.mode === "loading") { startGame(); return; }   // impatient? fine
  if (ui.mode === "instructions") {
    ui.instrPage++;
    if (ui.instrPage >= window.SLEUTH_INSTRUCTIONS.length) uiEnter("menu");
    else drawInstructions();
    return;
  }
  if (ui.mode === "names") {
    const n = ui.names;
    if (k === "Escape") { ui.customCast = null; uiEnter("menu"); return; }
    if (k === "Backspace") { n.buffer = n.buffer.slice(0, -1); drawNames(); return; }
    if (k === "Enter") {
      const fallback = house().characters[n.idx];
      const taken = (name) => n.list.some((p) =>
        p.key === name.toUpperCase() || p.nickKey === name.toUpperCase());
      if (n.field === 0) {
        const cand = n.buffer.trim() || fallback.first;
        if (taken(cand)) { n.dup = true; n.buffer = ""; drawNames(); return; }
        n.dup = false;
        n.first = cand;
        n.field = 1; n.buffer = "";
      } else if (n.field === 1) {
        // a lone space means: this character has no last name
        n.last = n.buffer.length && !n.buffer.trim() ? ""
               : (n.buffer.trim() || fallback.last);
        n.field = 2; n.buffer = "";
      } else {
        const nick = n.buffer.trim() || n.first;
        if (nick !== n.first && taken(nick)) {
          n.dup = true; n.buffer = ""; drawNames(); return;
        }
        n.dup = false;
        n.list.push({ first: n.first, last: n.last, nick,
                      key: n.first.toUpperCase(),
                      nickKey: nick.toUpperCase() });
        n.idx++; n.field = 0; n.buffer = ""; n.first = ""; n.last = "";
        if (n.idx >= 7) {
          ui.customCast = n.list;
          uiEnter("menu");
          return;
        }
      }
      drawNames(); return;
    }
    if (k.length === 1 && /[a-zA-Z0-9' -]/.test(k) && n.buffer.length < 12) {
      n.buffer += k; drawNames();
    }
    return;
  }
  // the menu
  const u = k.toUpperCase();
  if (u === "A" || k === "Enter") { uiEnter("loading"); return; }
  if (u === "H") {
    ui.houseIdx = (ui.houseIdx + 1) % window.SLEUTH_HOUSES.length;
    state.houseIdx = ui.houseIdx;        // guest list + title track it
    drawMenu(); return;
  }
  if (u === "C") {
    state.schemeIdx = (state.schemeIdx + 1) % SCHEMES.length;
    drawMenu(); return;
  }
  if (u === "S") {
    if (ui.customCast) { ui.customCast = null; drawMenu(); }
    else uiEnter("names");
    return;
  }
  if (u === "R") { reseed(Math.floor(Math.random() * 1e6)); drawMenu(); return; }
  if (u === "I") { uiEnter("instructions"); return; }
  if (u === "L") {
    // paste-JSON import: the humble prompt() works from file://, a
    // local server, and GitHub Pages alike — no storage, no upload.
    if (typeof prompt !== "function") return;
    const text = prompt("Paste a sleuth-house JSON draft:");
    if (!text) { drawMenu(); return; }
    try {
      const doc = JSON.parse(text);
      const spec = doc && doc.format === "sleuth-house" ? doc.spec : doc;
      window.registerSleuthHouse(spec);
      state.houseIdx = window.SLEUTH_HOUSES.length - 1;
      ui.houseIdx = state.houseIdx;
    } catch (e) {
      if (typeof alert === "function")
        alert("Could not load that house: " + e.message);
    }
    drawMenu(); return;
  }
}

function attachInput() { window.addEventListener("keydown", KEY_HANDLER); }
function detachInput() { window.removeEventListener("keydown", KEY_HANDLER); }

/* House-sharing codec (M8.4): a spec as base64url-encoded UTF-8 JSON.
   No compression, no dependencies — a furnished house is ~10-20KB of
   fragment, which never leaves the browser and every engine handles.
   The JSON file remains the robust interchange; the link is the
   convenient one. */
function encodeHouseHash(spec) {
  const bytes = new TextEncoder().encode(JSON.stringify(spec));
  let bin = "";
  for (let i = 0; i < bytes.length; i += 0x8000)
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function decodeHouseHash(s) {
  const bin = atob(s.replace(/-/g, "+").replace(/_/g, "/"));
  return JSON.parse(new TextDecoder().decode(
    Uint8Array.from(bin, (c) => c.charCodeAt(0))));
}

// #h=<encoded spec> on the player URL registers a shared house at
// boot and selects it — the workshop's "player link". Accepts both a
// bare spec and the {format:"sleuth-house", spec} wrapper. Failure is
// non-fatal: complain to the console, boot the stock houses.
function importHashHouse() {
  try {
    const m = /[#&]h=([^&]+)/.exec(
      (typeof location !== "undefined" && location.hash) || "");
    if (!m) return false;
    const doc = decodeHouseHash(m[1]);
    const spec = doc && doc.format === "sleuth-house" ? doc.spec : doc;
    window.registerSleuthHouse(spec);
    state.houseIdx = window.SLEUTH_HOUSES.length - 1;
    ui.houseIdx = state.houseIdx;
    return true;
  } catch (e) {
    if (typeof console !== "undefined")
      console.warn("hash house import failed:", e.message);
    return false;
  }
}

// boot: straight into the game for automated harnesses, title
// otherwise — unless a host page (the Phase-2 workshop) sets
// SLEUTH_NO_BOOT before this script runs, in which case the engine
// loads passively: no title, no keyboard grab, no #screen writes.
// The host activates the game itself via SLEUTH_DEBUG.attachInput()
// + startGame(), and puts it back to sleep with detachInput() (M8.4).
if (window.SLEUTH_NO_BOOT) {
  /* dormant until the host calls */
} else if (window.SLEUTH_AUTOSTART || window.SLEUTH_SEED !== undefined) {
  attachInput();
  importHashHouse();
  ui.mode = "game";
  scatter();
  spawn(false);
} else {
  attachInput();
  importHashHouse();
  uiEnter("title");
}
