   SLEUTH remaster — engine.js — Phase 2, Milestone 6
   =====================================================================
   M1 gave us a walkable house. M2 adds THINGS: a scattered set of
   objects, a command line, a parser fed by the original SUNDRIES
   vocabulary, and the magnifying-glass investigation loop — all using
   messages recovered verbatim from SLEUTH.EXE.

   The recovered rules (see README, "What the strings taught us"):
     * one object per room, chosen from 3 room-appropriate candidates
       (WEAPN's 33 records = 3 sets x 11 rooms, in room order)
     * objects appear as scene text on room entry, not map glyphs
     * EXAMINE FLOOR in the murder room reveals bloodstains
     * without the glass, examining an object is inconclusive;
       with it, the murder weapon shows traces of blood
     * you only ever carry the glass and the confirmed murder weapon

   Reading order: RNG -> SCREEN -> PALETTES -> MAP -> MESSAGES ->
   WORLD (scatter) -> PLAYER -> PARSER -> VERBS -> CHROME -> INPUT.
   ===================================================================== */

"use strict";

/* ---------------------------------------------------------------------
   0. RNG — seeded randomness, so bugs are reproducible
   ---------------------------------------------------------------------
   Math.random() can't be replayed. mulberry32 is a tiny deterministic
   generator: same seed, same shuffle, same mystery. The seed appears
   in the status line; load with ?seed=12345 to replay a layout. */

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const urlSeed = new URLSearchParams(location.search).get("seed");
let SEED = urlSeed ? Number(urlSeed)
                   : (window.SLEUTH_SEED ?? Math.floor(Math.random() * 1e6));
let rng = mulberry32(SEED);
function reseed(n) { SEED = n; rng = mulberry32(SEED); }
const pick = (arr) => arr[Math.floor(rng() * arr.length)];

/* ---------------------------------------------------------------------
   1. SCREEN — emulated 80x25 text-mode video buffer (unchanged from M1)
   --------------------------------------------------------------------- */

const COLS = 80, ROWS = 25;

const VGA = [
  "#000000", "#0000aa", "#00aa00", "#00aaaa",
  "#aa0000", "#aa00aa", "#aa5500", "#aaaaaa",
  "#555555", "#5555ff", "#55ff55", "#55ffff",
  "#ff5555", "#ff55ff", "#ffff55", "#ffffff",
];

const screen = [];
for (let r = 0; r < ROWS; r++) {
  screen.push(Array.from({ length: COLS }, () => ({ ch: " ", attr: 0x07 })));
}

function put(row, col, ch, attr) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
  const cell = screen[row][col];
  cell.ch = ch;
  cell.attr = attr;
}

function print(row, col, text, attr) {
  for (let i = 0; i < text.length; i++) put(row, col + i, text[i], attr);
}

function clearRow(row, attr) {
  for (let c = 0; c < COLS; c++) put(row, c, " ", attr);
}

function render() {
  let html = "";
  for (let r = 0; r < ROWS; r++) {
    let runAttr = null, run = "";
    for (let c = 0; c < COLS; c++) {
      const { ch, attr } = screen[r][c];
      if (attr !== runAttr) {
        if (run) html += spanFor(run, runAttr);
        runAttr = attr; run = "";
      }
      run += ch;
    }
    html += spanFor(run, runAttr) + "\n";
  }
  document.getElementById("screen").innerHTML = html;
}

function spanFor(text, attr) {
  const fg = VGA[attr & 0x0f], bg = VGA[(attr >> 4) & 0x07];
  const safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;");
  return `<span style="color:${fg};background:${bg}">${safe}</span>`;
}

/* ---------------------------------------------------------------------
   2. PALETTES — the five schemes recovered from SUSPICT.V0-V9
   --------------------------------------------------------------------- */

const SCHEMES = [
  { name: "0x07 mono",             map: 0x07, key: "07" },
  { name: "0x17 white on blue",    map: 0x17, key: "17" },
  { name: "0x47 white on red",     map: 0x47, key: "47" },
  { name: "0x57 white on magenta", map: 0x57, key: "57" },
  { name: "0x67 white on brown",   map: 0x67, key: "67" },
];

/* ---------------------------------------------------------------------
   3. MAP — grid, state, drawing (as in M1)
   --------------------------------------------------------------------- */

const MAP_TOP = 1;        // screen row of the BSAVE dump's first row
const SPRITE_TOP = 2;     // grid row 0 renders one row lower (border)

const state = {
  houseIdx: 0,
  schemeIdx: 0,
  row: 0, col: 0,
  roomId: null,
  lastDoor: null,
  lastStairs: null,
};

const house = () => window.SLEUTH_HOUSES[state.houseIdx];
const cellAt = (r, c) => {
  const g = house().grid;
  return (r >= 0 && r < g.length && c >= 0 && c < g[0].length) ? g[r][c] : 0;
};

/* Custom houses ship no BSAVE art, so we synthesise a screen from the
   grid in the original's visual dialect: thin walls, gaps for doors,
   rungs for stairs, a border row on top, and the outdoor strip
   undrawn. Cached on the house object after first build. */
function synthesizeScreen(grid) {
  const chars = ["\u2588".repeat(79) + " "];
  for (let r = 0; r < 16; r++) {
    let row = "";
    for (let x = 0; x < 80; x++) {
      const c = Math.floor((x + 1) / 2);          // cell owning column x
      if (c >= 40) { row += " "; continue; }      // x=79: the black margin
                                                  // (the BSAVE originals
                                                  // keep it empty; M8.4b)
      const v = grid[r][c];
      if (v === 0) {
        if (c === 39) {
          // the east perimeter wall sits on the RIGHT char (x=78) so
          // its corner meets the border row's last block and the grey
          // header above — one glyph, aligned (M8.4d). The left char
          // only joins when the wall mass continues from col 38.
          row += (x === 78 || grid[r][38] === 0) ? "\u2588" : " ";
          continue;
        }
        // beyond col 39 is the black MARGIN, not more wall — counting
        // it as wall doubled the east perimeter (M8.4c, Brindle Manor)
        const rightIsWall = c + 1 < 40 && grid[r][c + 1] === 0;
        row += (x === 2 * c - 1 || x === 0) ? "\u2588"
             : (rightIsWall ? "\u2588" : " ");
      } else if (v === 12 || v === 13 ||
                 v === 32 || v === 33) row += "\u2500";  // stair rungs —
                                                  // landings included
                                                  // (they ARE the stairs)
      else row += " ";
    }
    chars.push(row);
  }
  const palettes = {};
  for (const s of SCHEMES)
    palettes[s.key] = chars.map(() => s.key.repeat(80));
  return { chars, palettes };
}

function drawHouse() {
  if (!house().screen) house().screen = synthesizeScreen(house().grid);
  // Not a reconstruction: these are the character and attribute bytes
  // from the original BSAVE screen dumps, blitted the way SLEUTH.EXE
  // BLOADed them into video memory at B000h. The grid is only used
  // for game logic; what you SEE is 1983's own screen.
  const scr = house().screen;
  const pal = scr.palettes[SCHEMES[state.schemeIdx].key];
  for (let r = 0; r < scr.chars.length; r++) {
    const chRow = scr.chars[r], atRow = pal[r];
    for (let c = 0; c < COLS; c++) {
      put(r + MAP_TOP, c, chRow[c],
          parseInt(atRow.substr(c * 2, 2), 16));
    }
  }
}

// the map background attribute under a grid cell (for drawing sprites
// with the room's own background colour behind them)
function bgAt(gr, gc) {
  const pal = house().screen.palettes[SCHEMES[state.schemeIdx].key];
  const row = pal[gr + 1];                  // +1: the border row offset
  return row ? parseInt(row.substr(gc * 4, 2), 16) & 0x70 : 0;
}

/* ---------------------------------------------------------------------
   4. MESSAGES — narration log, now 5 rows (row 24 is the command line)
   --------------------------------------------------------------------- */

const MSG_TOP = 20, MSG_ROWS = 4;
const PAGINATE = false;   // -- MORE -- gate shelved: the title flow
                          // trimmed the intro, the main overrun source
const pending = [];       // lines waiting behind the -- MORE -- gate
let freshLines = 0;       // unacknowledged lines on screen
const log = [];

function wrap(text, width) {
  if (text.length <= width) return [text];   // preserve deliberate spacing
  const words = text.split(/\s+/), lines = [];
  let line = "";
  for (const w of words) {
    if ((line + " " + w).trim().length > width) { lines.push(line); line = w; }
    else line = (line + " " + w).trim();
  }
  if (line) lines.push(line);
  return lines;
}

function say(text, attr) {
  if (text) for (const line of wrap(text, COLS - 2)) {
    const entry = { t: line, a: attr || 0x07 };
    if (PAGINATE) pending.push(entry);
    else { log.push(entry); while (log.length > MSG_ROWS) log.shift(); }
  }
  pump();
}

// the original clears the message area for every action, which is
// how it never overruns: each move or command starts a fresh page
function freshLog() { log.length = 0; freshLines = 0; }

/* Move pending lines onto the screen, at most one page of new lines
   between keypresses; hold the rest behind a -- MORE -- marker. */
function pump() {
  while (pending.length && freshLines < MSG_ROWS) {
    log.push(pending.shift());
    while (log.length > MSG_ROWS) log.shift();
    freshLines++;
  }
  for (let i = 0; i < MSG_ROWS; i++) {
    clearRow(MSG_TOP + i, 0x07);
    if (log[i]) print(MSG_TOP + i, 1, log[i].t, log[i].a);
  }
  if (pending.length)
    print(MSG_TOP + MSG_ROWS - 1, COLS - 13, " -- MORE -- ", 0x70);
  render();
}

/* ---------------------------------------------------------------------
   5. WORLD — scattering the objects and the secrets
   ---------------------------------------------------------------------
   Per game: each of rooms 1-11 receives one object, picked from its 3
   candidates in the weapon table. One room (secretly) is the murder
   scene; one object (secretly) is the murder weapon; the magnifying
   glass lies in a random room. The world object is the single source
   of truth the verbs consult. */

const world = {
  objects: {},        // roomId -> {name, scene, examine, keys, examined}
  glassRoom: null,    // where the magnifying glass lies (null = taken)
  hasGlass: false,
  murderRoom: null,   // EXAMINE FLOOR here -> bloodstains
  weaponRoom: null,   // the object in this room is the murder weapon
  weaponKnown: false, // blood has been seen on it
  carrying: null,     // name of carried weapon (null = none)
  sceneFound: false,
  victim: null,       // one of the 7 cast members died before we arrived
  murderer: null,     // one of the remaining 6 (secret until M5)
  suspects: [],       // the living six: {first, last, key, room}
  turn: 0,
  panelCell: null,    // [r,c] wall cell hiding the secret panel
  westEnd: null,      // westmost passageway cell (blind corridor mouth)
  blind: false,       // mid-transit through the blind corridor
  alibis: {},         // suspect key -> {withKey, withName, room, told}
  gathered: false,    // ASSEMBLE has been called; the door is locked
  gatherRoom: null,
  deadline: 0,        // turn on which the murderer acts (EXE: "Deadline:")
  threat: 0,          // 0 calm, 1 suspicious, 2 stalking
  over: null,         // null | "won" | "lost"
};

function scatter() {
  analyzeHouse();
  world.objects = {};
  const w = house().weapons;
  for (const room of GUEST_ROOMS) {
    const candidates = w.filter((x) => x.room === room);
    world.objects[room] = { ...pick(candidates), examined: false };
  }
  const roomIds = [...GUEST_ROOMS];
  world.glassRoom = pick(roomIds);
  world.murderRoom = pick(roomIds);
  world.weaponRoom = pick(roomIds);
  world.hasGlass = false;
  world.weaponKnown = false;
  world.carrying = null;
  world.sceneFound = false;
  // the cast: seven names in DESCR; each game one is the victim and
  // the remaining six are the houseguests (one secretly the murderer)
  // callname resolution (M8.4c): an explicit nick wins (the names
  // screen supplies one); otherwise the parser KEY doubles as the name
  // everyone uses — so Arvil Iguana with key IGUANA is called Iguana.
  // Original cast keys are their first names uppercased, so this
  // changes nothing for the stock houses.
  const titled = (k) => k.charAt(0) + k.slice(1).toLowerCase();
  const callname = (p) => p.nick || (p.key ? titled(p.key) : p.first);
  const cast = [...(ui.customCast || house().characters)]
    .map((p) => ({ ...p, nick: callname(p),
                   nickKey: callname(p).toUpperCase() }));
  world.victim = cast.splice(Math.floor(rng() * cast.length), 1)[0];
  world.murderer = pick(cast);
  const spots = [...NPC_LOCATIONS];              // 6 guests, 12 seats,
  for (let i = spots.length - 1; i > 0; i--) {   // one guest per seat
    const j = Math.floor(rng() * (i + 1));
    [spots[i], spots[j]] = [spots[j], spots[i]];
  }
  world.suspects = cast.map((p, i) => ({ ...p, room: spots[i],
                                          staring: false,
                                          action: idleAction(spots[i]) }));
  // "one of the keen-eyed guests will probably notice something amiss
  // at some point during the game" (SLEUTH.DOC) — after this turn,
  // guests may begin staring at the floor: strongly in the murder
  // room, occasionally elsewhere as a red herring
  world.stareStart = 40 + Math.floor(rng() * 30);
  world.suspAt = 185;                    // measured: ~185 steps
  world.stalkAt = 285;                   // measured: ~100 steps later
  world.turn = 0;
  buildRoomGraph();
  buildNpcGraph();

  // the secret panel: one wall cell along the passageway's border,
  // randomised per game (as observed in the original: the entry spot
  // moves). A 1-thick wall cell with the passage on one side and a
  // room on the other qualifies.
  // playtest-corrected: the panel is only entered from the room ABOVE
  // the secret room, pressing Down. Houses with no sealed room get no
  // panel and no blind corridor — the features simply don't exist.
  const g = house().grid, cand = [];
  let west = null;
  if (SECRET_ROOM !== null) {
    for (let r = 0; r < g.length; r++) {
      for (let c = 0; c < g[0].length; c++) {
        if (g[r][c] === SECRET_ROOM && (!west || c < west[1] ||
            (c === west[1] && r < west[0]))) west = [r, c];
        if (g[r][c] !== 0) continue;
        const n = (rr, cc) => (g[rr] && g[rr][cc]) || 0;
        if (n(r + 1, c) === SECRET_ROOM && n(r - 1, c) > 0 &&
            n(r - 1, c) <= 20 && n(r - 1, c) !== SECRET_ROOM)
          cand.push([r, c]);
      }
    }
  }
  world.panelCell = cand.length ? pick(cand) : null;
  world.westEnd = west;
  world.blind = false;
  world.gathered = false;
  world.gatherRoom = null;
  world.deadline = 700;        // tunable; the original's is compiled-in.
                               // Calibrated so a leisurely full solve
                               // (~650 turns) stays conceivable.
  world.threat = 0;
  world.over = null;
  generateAlibis();
}

/* ---------------------------------------------------------------------
   5d. THE ENDGAME — the deadline, the stalking, three ways to die,
       GATHER, ACCUSE, and the ranks
   ---------------------------------------------------------------------
   The EXE's debug overlay ("Murderer: / Murder room: / Weapon: /
   Murderer loc: / Deadline:") tells us the original tracked a turn
   deadline and the murderer's position. Reconstruction: as the
   deadline nears, the murderer grows suspicious, then stalks — moving
   toward you — and if the clock runs out or the stalker corners you,
   one of the three recovered death scenes plays. Taking the murder
   weapon shortens your remaining time. */

const weaponName = () => world.objects[world.weaponRoom].name;
const murdererS = () => world.suspects.find((s) => s.key === world.murderer.key);

function gameOver(result) {
  world.over = result;
  // (no prompt line: the original ends on the rank line — QUIT and
  // RESTART remain available, as HELP explains)
  redraw();
}

function die(variant) {
  const m = murdererS(), w = weaponName(), v = world.victim.nick;
  if (variant === "cosh") {
    say(`In a flash, ${m.nick} locks the door behind you, grabs the ` +
        `${w} from your hands, and coshes you over the head . . . .`);
    say("I guess that wraps up this investigation!");
  } else if (variant === "ambush") {
    say(`${m.nick} quietly locks the door behind you as you enter the ` +
        `${roomName(locOf(state.roomId))}.  "Let me satisfy your ` +
        `curiosity inspector.  I killed ${v} with the ${w} and now I ` +
        `intend to dispose of you!  Goodbye, inspector!!"`);
  } else {
    say(`${m.nick} locks the door and turns toward you.  "I'm sick and ` +
        `tired of your snooping.  I killed ${v} with the ${w} and now ` +
        `I'm going to get rid of you!  I'm afraid that your ` +
        `investigation is over!!"`);
  }
  gameOver("lost");
}

// one BFS step along the guest graph, toward the player. The stalker
// positions but never strikes here: the kill only ever happens when
// the DETECTIVE walks into a room — the death scene says so itself
// ("...locks the door behind you AS YOU ENTER the..."). Corridors,
// halls and the landing are safe ground.
function stalkStep() {
  const m = murdererS();
  const targetLoc = locOf(state.roomId);
  if (!NPC_GRAPH[targetLoc] || m.room === targetLoc) return;   // waits
  const prev = { [m.room]: null }, queue = [m.room];
  while (queue.length) {
    const n = queue.shift();
    if (n === targetLoc) break;
    for (const nb of NPC_GRAPH[n] || [])
      if (!(nb in prev)) { prev[nb] = n; queue.push(nb); }
  }
  if (!(targetLoc in prev)) return;
  let step = targetLoc;
  while (prev[step] !== m.room) step = prev[step];
  m.room = step;
  m.action = idleAction(m.room);   // M8.4c: no more carrying Room 9's
                                   // cot line through the whole wing
}

function threatCheck() {
  // thresholds calibrated by step-counting the original in DOSBox:
  // "grown suspicious" lands ~185 moves in, "stalking" ~100 later
  if (world.threat < 2 && world.turn >= world.stalkAt) world.threat = 2;
  else if (world.threat < 1 && world.turn >= world.suspAt) world.threat = 1;
  if (world.threat < 3 && world.turn >= world.deadline) world.threat = 3;
  if (world.threat >= 2 && !world.over) stalkStep();
}

// the original prints the active warning with EVERY step's
// description — a persistent drumbeat, not a one-shot announcement
function sayThreat() {
  if (world.over) return;
  if (world.threat >= 2) say("The murderer is now stalking you!");
  else if (world.threat === 1)
    say("The murderer has grown suspicious of your investigation!");
}

/* ---------------------------------------------------------------------
   5c. THE MYSTERY — alibi generation
   ---------------------------------------------------------------------
   The engine strings give the two statement shapes:
     "«X» and I spent the entire evening together in the «room»."
     "I spent the entire evening alone in the «room»."
   The five INNOCENTS tell the truth: two pairs who really were
   together, and one loner. The MURDERER lies — claiming to have spent
   the evening with one of the innocents, in that innocent's real
   room. Question everyone and exactly ONE claim goes unreciprocated:
   the murderer names a companion whose own story doesn't include
   them. That single contradiction is the whole solvable core of
   Sleuth, reconstructed from the statement templates the EXE carries. */

function generateAlibis() {
  world.alibis = {};
  const innocents = world.suspects.filter((s) => s !== world.murderer &&
                                                 s.key !== world.murderer.key);
  // Fisher-Yates with the seeded rng, so mysteries replay
  for (let i = innocents.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [innocents[i], innocents[j]] = [innocents[j], innocents[i]];
  }
  // three distinct alibi rooms (never the murder room — nobody who
  // spent the whole evening at the crime scene missed a murder)
  const roomsAvail = GUEST_ROOMS.filter((r) => r !== world.murderRoom);
  for (let i = roomsAvail.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [roomsAvail[i], roomsAvail[j]] = [roomsAvail[j], roomsAvail[i]];
  }
  const [rA, rB, rC] = roomsAvail;

  const set = (s, withS, room) => {
    world.alibis[s.key] = {
      withKey: withS ? withS.key : null,
      withName: withS ? withS.nick : null,
      room, told: false,
    };
  };
  set(innocents[0], innocents[1], rA);   // pair one, truthful
  set(innocents[1], innocents[0], rA);
  set(innocents[2], innocents[3], rB);   // pair two, truthful
  set(innocents[3], innocents[2], rB);
  set(innocents[4], null, rC);           // the loner, truthful
  // the lie: the murderer borrows an innocent's evening
  const claimed = pick(innocents);
  const m = world.suspects.find((s) => s.key === world.murderer.key);
  set(m, claimed, world.alibis[claimed.key].room);
}

function roomName(rid) {
  const r = house().rooms[String(rid)];
  return r ? r.name : "house";
}

function alibiStatement(a) {
  return a.withName
    ? `${a.withName} and I spent the entire evening together in the ` +
      `${roomName(a.room)}.`
    : `I spent the entire evening alone in the ${roomName(a.room)}.`;
}

/* ---------------------------------------------------------------------
   5b. PEOPLE — the room graph and the wandering houseguests
   ---------------------------------------------------------------------
   Suspects move room-to-room, not cell-to-cell: each turn (= each
   player step) a suspect may wander to an adjacent room. Adjacency is
   derived from the grid itself: two rooms connect wherever their
   floor cells touch or a door cell joins them, plus the staircase
   pair (landing codes 32<->33) and the secret panel into room 2. */

/* The derivation CORES are pure functions of (grid, weapons) — no
   house(), no module state. The stateful analyzeHouse/buildRoomGraph/
   buildNpcGraph wrappers below feed them the current house and store
   the results; the Phase-2 workshop validator (workshop_core.js) calls
   the very same cores on draft specs. One implementation, two callers —
   the derived model can never drift from what the game actually plays.
   Exported as window.SLEUTH_CORE at the end of this file. */

function findCellIn(g, code) {
  for (let r = 0; r < g.length; r++)
    for (let c = 0; c < g[0].length; c++)
      if (g[r][c] === code) return [r, c];
  return null;
}

function computeAnalysis(grid, weapons) {
  const g = grid;
  const guestRooms = [...new Set((weapons || []).map((w) => w.room))].sort((a, b) => a - b);
  const hasStairs = !!findCellIn(g, 12);
  const npcLocations = guestRooms.concat(hasStairs && !guestRooms.includes(12) ? [12] : []);
  const start = findCellIn(g, 36) || findCellIn(g, 35) || middleCellIn(g, guestRooms[0]);
  // the landing pair 32<->33 is a teleport (M3: "the bridge is the
  // landing pair"), so the reachability flood must jump it too —
  // otherwise a V1-style detached upper floor reads as unreachable and
  // the secret-room derivation depends on room-id ordering luck
  // (found by the M8.1 validator; latent since M6)
  const twinLo = findCellIn(g, 32), twinHi = findCellIn(g, 33);
  const seen = new Set(start ? [start.join()] : []), q = start ? [start] : [];
  while (q.length) {
    const [r, c] = q.pop();
    const hops = [[r + 1, c], [r - 1, c], [r, c + 1], [r, c - 1]];
    if (g[r][c] === 32 && twinHi) hops.push(twinHi);
    if (g[r][c] === 33 && twinLo) hops.push(twinLo);
    for (const [nr, nc] of hops) {
      const k = nr + "," + nc;
      if (g[nr] && g[nr][nc] > 0 && !seen.has(k)) { seen.add(k); q.push([nr, nc]); }
    }
  }
  const secretRoom = guestRooms.find((rid) => {
    const cell = middleCellIn(g, rid);
    return cell && !seen.has(cell.join());
  }) ?? null;
  return { guestRooms, npcLocations, secretRoom, reachable: seen };
}

function computeRoomGraph(grid, secretRoom) {
  const g = grid, H = g.length, W = g[0].length;
  const graph = {};
  const norm = (v) => (v === 0 ? 0 : v > 20 ? v - 20 : v);
  const connect = (a, b) => {
    if (!a || !b || a === b) return;
    (graph[a] = graph[a] || new Set()).add(b);
    (graph[b] = graph[b] || new Set()).add(a);
  };
  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      const a = norm(g[r][c]);
      if (c + 1 < W) connect(a, norm(g[r][c + 1]));
      if (r + 1 < H) connect(a, norm(g[r + 1][c]));
      // secret panel: a 1-thick wall with the secret room on one side
      // and another room on the other joins them (guests know the way)
      if (g[r][c] === 0 && secretRoom !== null) {
        const S = secretRoom;
        if (c > 0 && c + 1 < W &&
            (norm(g[r][c-1]) === S) !== (norm(g[r][c+1]) === S))
          connect(norm(g[r][c-1]), norm(g[r][c+1]));
        if (r > 0 && r + 1 < H &&
            (norm(g[r-1][c]) === S) !== (norm(g[r+1][c]) === S))
          connect(norm(g[r-1][c]), norm(g[r+1][c]));
      }
    }
  }
  if (findCellIn(g, 32) && findCellIn(g, 33)) connect(12, 13);   // the staircase
  return graph;
}

let ROOM_GRAPH = {};

function buildRoomGraph() {
  ROOM_GRAPH = computeRoomGraph(house().grid, SECRET_ROOM);
}

function middleCell(roomId) {
  const g = house().grid, cells = [];
  for (let r = 0; r < g.length; r++)
    for (let c = 0; c < g[0].length; c++)
      if (g[r][c] === roomId) cells.push([r, c]);
  return cells.length ? cells[Math.floor(cells.length / 2)] : null;
}

function findCell(code) {
  const g = house().grid;
  for (let r = 0; r < g.length; r++)
    for (let c = 0; c < g[0].length; c++)
      if (g[r][c] === code) return [r, c];
  return null;
}

/* Per-house feature analysis. Custom houses may lack a secret room,
   stairs, or the full eleven rooms; everything below is DERIVED:
     GUEST_ROOMS   rooms that hold objects/guests/alibis (from the
                   weapon table's room ids)
     NPC_LOCATIONS guest rooms + the staircase, if the grid has one
     SECRET_ROOM   a guest room unreachable by ordinary walking (if
                   any) — it gets the panel and the blind corridor;
                   houses without one simply have neither. */

let GUEST_ROOMS = [], NPC_LOCATIONS = [], SECRET_ROOM = null;

function analyzeHouse() {
  const a = computeAnalysis(house().grid, house().weapons);
  GUEST_ROOMS = a.guestRooms;
  NPC_LOCATIONS = a.npcLocations;
  SECRET_ROOM = a.secretRoom;
}

function middleCellIn(g, rid) {
  const cells = [];
  for (let r = 0; r < g.length; r++)
    for (let c = 0; c < g[0].length; c++)
      if (g[r][c] === rid) cells.push([r, c]);
  return cells.length ? cells[Math.floor(cells.length / 2)] : null;
}

/* Guests occupy exactly the 12 locations that have a seat and an
   idle-action pool: rooms 1-11 plus the staircase (12). Halls, the
   outdoors, and the upper flight are TRANSIT — guests pass through
   but never stand there (the halls have no seat and not one scripted
   sentence for an idler). At most ONE guest per location, which is
   why the seat table needs only one seat each — and why QUESTION is
   never ambiguous. The upper flight (13) is the same staircase as 12
   for occupancy purposes. */

// the player's location in occupancy terms (both flights = one stair)
function locOf(roomId) {
  return roomId === 13 ? 12 : roomId;
}

// contracted movement graph: two guest locations connect if a path
// joins them through transit-only nodes in the full room graph
function computeNpcGraph(roomGraph, npcLocations) {
  const graph = {};
  const allowed = new Set(npcLocations);
  const roomIds = Object.keys(roomGraph).map(Number);
  for (const a of npcLocations) {
    // seed from EVERY room mapping to this location: a staircase is
    // TWO rooms (lower + upper), and seeding only one made the graph
    // asymmetric — guests drained out of whole wings and never came
    // back, starving east-wing murder rooms of witnesses
    const seeds = roomIds.filter((r) => locOf(r) === a);
    const reach = new Set(), seen = new Set(seeds), queue = [...seeds];
    while (queue.length) {
      const n = queue.shift();
      for (const nb of roomGraph[n] || []) {
        if (seen.has(nb)) continue;
        seen.add(nb);
        const nbLoc = locOf(nb);
        if (allowed.has(nbLoc) && nbLoc !== a) reach.add(nbLoc);
        else if (!allowed.has(nbLoc) || nbLoc === a) queue.push(nb);
      }
    }
    graph[a] = [...reach];
  }
  return graph;
}

let NPC_GRAPH = {};
function buildNpcGraph() {
  NPC_GRAPH = computeNpcGraph(ROOM_GRAPH, NPC_LOCATIONS);
}

function idleAction(roomId) {
  const room = house().rooms[String(roomId)];
  const pool = (room && room.npc_actions && room.npc_actions.length)
    ? room.npc_actions.flat()
    : (house().landing_actions || []).flat();
  return pool.length ? pick(pool) : "is standing around.";
}

function tick() {
  if (world.over) return;
  world.turn++;
  if (world.gathered) return;               // everyone waits, breath baited
  threatCheck();
  if (world.over) return;
  // NPC_MOVE_CHANCE is a remaster tunable: the original's true rate is
  // compiled-in and only measurable by watching DOSBox sessions.
  // Guests in YOUR room never move — all wandering happens off-screen,
  // so the only visible transition is an arrival. (Playtest note: the
  // original never showed guests blinking out from under you.)
  const NPC_MOVE_CHANCE = 0.05;
  for (const s of world.suspects) {
    if (s.room === locOf(state.roomId)) continue;   // engaged: stays put
    if (world.threat >= 2 && s.key === world.murderer.key) continue;
    if (rng() < NPC_MOVE_CHANCE) {
      const occupied = new Set(world.suspects.map((x) => x.room));
      const options = (NPC_GRAPH[s.room] || [])
        .filter((r) => !occupied.has(r));      // one guest per location
      if (options.length) {
        const from = s.room;
        s.room = pick(options);
        s.action = idleAction(s.room);   // a fresh pastime per visit
        // a guest arriving where the player stands is worth a line
        if (guestVisible(s) && from !== locOf(state.roomId))
          say(`${s.nick} ${actionOf(s)}`);
      }
    }
  }
  // the keen-eyed guests: after stareStart, staring states drift —
  // toward the floor in the murder room, rarely elsewhere
  // Sticky staring (playtest recalibration): in the murder room a
  // guest soon starts staring and KEEPS staring while they remain;
  // elsewhere, stares are rare red herrings that quickly fade.
  if (world.turn >= world.stareStart) {
    for (const s of world.suspects) {
      if (s.room === world.murderRoom) {
        // the true tell may latch ON even while watched — and never lets go
        if (!s.staring && rng() < 0.25) s.staring = true;
      } else if (s.room === locOf(state.roomId)) {
        // observed guests hold their state: no flickering in front of
        // the detective; herrings only resolve once you leave
      } else if (s.staring) {
        if (rng() < 0.4) s.staring = false;
      } else if (rng() < 0.02) {
        s.staring = true;
      }
    }
  }
}

// display helpers: the NICKNAME is used wherever one name appears;
// full names tolerate a blank last name (one-word characters)
const fullName = (p) => (p.first + " " + (p.last || "")).trim();
const matchSuspect = (input, s) =>
  input.includes(s.key) ||
  (s.nickKey && s.nickKey !== s.key && input.includes(s.nickKey));

// where a guest is drawn/seen; on split locations (the staircase has
// an upper and a lower flight in different wings) a guest is only
// visible from the flight their anchor actually occupies
function guestPos(s) {
  return (world.gathered && world.gatherSeats && world.gatherSeats[s.key]) ||
         house().anchors[String(s.room)] || middleCell(s.room);
}
function guestVisible(s) {
  if (s.room !== locOf(state.roomId)) return false;
  const pos = guestPos(s);
  if (!pos) return false;
  const rc = cellAt(pos[0], pos[1]);
  return rc === state.roomId || rc + 20 === state.roomId;
}

// what a guest is visibly doing: the stare overrides idle flavour
function actionOf(s) {
  // stored per room-visit, so re-describing the room doesn't have the
  // guests fidgeting through six hobbies while the detective paces
  if (s.staring) return "is staring at the floor.";
  if (!s.action) s.action = idleAction(s.room);
  return s.action;
}

const objectHere = () =>
  GUEST_ROOMS.includes(state.roomId) ? world.objects[state.roomId] : null;
const isMurderWeapon = (roomId) => roomId === world.weaponRoom &&
  world.objects[roomId] && world.objects[roomId].name !== world.carrying;

/* ---------------------------------------------------------------------
   6. PLAYER — spawn, movement, room narration
   --------------------------------------------------------------------- */

function spawn(newGame) {
  if (newGame) scatter();
  // "You are now standing at the front door" — spawn on the front
  // door cell (code 36, V1) or just inside the main-hall entry (above
  // door 35, V2); the outdoor strip below isn't part of the drawn
  // screen in the original
  // spawn outdoors at the front entrance: below the front door (36),
  // or on the LEFTMOST lawn door (34/35) — the original starts House 2
  // on the left side, below the west stairs
  let pos = null;
  const front = findCell(36);
  if (front) {
    pos = cellAt(front[0] + 1, front[1]) > 0
        ? [front[0] + 1, front[1]] : front;
  } else {
    const g = house().grid;
    for (let r = 0; r < g.length; r++)
      for (let c = 0; c < g[0].length; c++)
        if ((g[r][c] === 34 || g[r][c] === 35) && (!pos || c < pos[1]))
          pos = [r, c];
  }
  if (!pos) pos = findCell(15) || [1, 1];
  [state.row, state.col] = pos;
  state.roomId = null;
  state.lastDoor = null;
  log.length = 0;
  redraw();
  say(`${fullName(world.victim)} was brutally murdered ` +
      "only hours ago.  The body was removed by persons unknown from " +
      "the murder scene.  You are now standing at the front door of " +
      `the ${(world.victim.last || "").trim() || world.victim.nick} estate.  ` +
      "The door is open.");
  describeCell(true);
}

function tryMove(dr, dc) {
  if (world.over) return;
  const r = state.row + dr, c = state.col + dc;
  // once the suspects are assembled, the door is locked
  if (world.gathered) {
    const v = cellAt(r, c);
    const dest = v === 0 ? 0 : locOf(v > 20 ? v - 20 : v);
    if (v !== 0 && dest !== world.gatherRoom) {
      freshLog();
      say("The door is now locked.");
      redraw();
      return;
    }
  }

  const onPanel = world.panelCell &&
    state.row === world.panelCell[0] && state.col === world.panelCell[1];

  if (cellAt(r, c) === 0) {
    // THE SECRET PANEL — two-step, as observed in the original:
    // bump the (randomised, per game) panel cell from the room above,
    // moving DOWN, and you step INTO the wall itself, message fires;
    // your next move carries you on through into the passageway.
    if (world.panelCell && r === world.panelCell[0] &&
        c === world.panelCell[1] && dr === 1 &&
        cellAt(state.row, state.col) !== SECRET_ROOM) {
      state.row = r; state.col = c;
      say(house().rooms[String(SECRET_ROOM)].entry_description);
      tick();
      sayThreat();
      redraw();
      return;
    }
    // THE BLIND CORRIDOR — at the passageway's west end, bump onward
    // and you vanish into an unlit shaft; the next keypress sounds
    // in the dark and drops you somewhere random in the house
    if (cellAt(state.row, state.col) === SECRET_ROOM && world.westEnd &&
        state.row === world.westEnd[0] && state.col === world.westEnd[1]) {
      world.blind = true;
      say("You are walking through a blind corridor in the secret " +
          "passageway.");
      tick();
      redraw();
      return;
    }
    return;
  }

  const prevPos = [state.row, state.col];   // for the staircase refusal
  state.row = r; state.col = c;
  if (onPanel) state.lastDoor = null;   // stepping out of the wall

  // the staircase: stepping onto a landing (32/33) carries you to its
  // partner landing on the other flight — you arrive ON the partner
  // and step off in any open direction ("change direction to keep
  // climbing", as the manual says). M8.4b: no arrival step required;
  // a partner with no open side would be a one-way trap, so entry is
  // simply refused.
  const code = cellAt(r, c);
  if (code === 32 || code === 33) {
    const partner = findCell(code === 32 ? 33 : 32);
    if (partner) {
      const open = [[1, 0], [-1, 0], [0, 1], [0, -1]].some(([dr, dc]) =>
        (cellAt(partner[0] + dr, partner[1] + dc) || 0) > 0);
      if (!open) {
        [state.row, state.col] = prevPos;   // the move never happened
        freshLog();
        say("The stairway is impassable \u2014 the far landing is " +
            "walled off.");
        redraw();
        return;
      }
      [state.row, state.col] = partner;
      freshLog();
      const stairRoom = house().rooms[String((code === 32 ? 33 : 32) - 20)];
      if (stairRoom && stairRoom.entry_description)
        say(stairRoom.entry_description);
      tick();
      sayThreat();
      redraw();
      return;
    }
  }

  const prevLoc = locOf(state.roomId);
  freshLog();                            // every step repaints its story
  tick();
  if (checkAmbush(prevLoc)) return;
  describeCell(true);
  sayThreat();
  redraw();
}

/* The one and only kill trigger: the detective ENTERING a room
   (1-11). At threat 2 the stalking murderer must be waiting inside;
   at threat 3 (deadline passed) the murderer intercepts wherever you
   enter next. Carrying the weapon always earns the cosh. */
function checkAmbush(prevLoc) {
  if (world.over || world.threat < 2) return false;
  const v = cellAt(state.row, state.col);
  const newLoc = locOf(v > 20 ? v - 20 : v);
  if (!GUEST_ROOMS.includes(newLoc) || newLoc === prevLoc) return false;
  // state.roomId still holds the room you LEFT at this point, and the
  // death scene names locOf(state.roomId) — Brindle Manor died "in the
  // Upper Hallway" while legally ambushed one step INSIDE a murder
  // room. Point it at the room actually entered before the scene plays.
  state.roomId = v > 20 ? v - 20 : v;
  if (world.threat >= 3) {
    die(world.carrying ? "cosh" : "corner");
    return true;
  }
  if (murdererS().room === newLoc) {
    die(world.carrying ? "cosh" : "ambush");
    return true;
  }
  return false;
}

function describeCell(force) {
  const v = cellAt(state.row, state.col);
  const rooms = house().rooms;

  if (v > 20) {
    const target = rooms[String(v - 20)];
    if (state.lastDoor !== `${state.row},${state.col}` && target) {
      say(target.entry_description ||
          `This is the entrance to the ${target.name}.`);
      state.lastDoor = `${state.row},${state.col}`;
    }
    return;
  }
  state.lastDoor = null;

  if (v !== state.roomId || force) {
    state.roomId = v;
    const room = rooms[String(v)];
    if (room) say(room.description);
    const obj = objectHere();
    if (obj && obj.name !== world.carrying) say(obj.scene);
    if (state.roomId === world.glassRoom)
      say("A magnifying glass is lying on the floor.");
    for (const s of world.suspects)
      if (guestVisible(s))
        say(`${fullName(s)} ${actionOf(s)}`);
  }
}

/* ---------------------------------------------------------------------
   7. PARSER — the SUNDRIES vocabulary, faithfully shallow
   ---------------------------------------------------------------------
   The original's parser is two keyword scans: find a verb, then find a
   noun. All keywords in the data are UPPERCASE prefixes — DELICAC
   matches "delicacies", SERV matches "serving set". We honour that:
   a keyword matches if it appears as a substring of the (uppercased)
   input. Crude, and exactly the point: this is a 1983 parser. */

const VOCAB = window.SLEUTH_VOCAB;

const SHORTCUTS = {
  // Q and EX are documented in SLEUTH.DOC ("you can abbreviate
  // QUESTION as Q and EXAMINE as EX"); G and A are remaster
  // conveniences in the same spirit
  Q: 2, EX: 1, G: 4, A: 7,
};

function matchVerb(input) {
  const first = input.split(/\s+/)[0];
  if (first in SHORTCUTS) return SHORTCUTS[first];
  // the original scanned the verb table in file order with INSTR —
  // a substring hit anywhere in the input wins. "GUESTS" matches
  // GUEST; so, faithfully, would "EXAMINE THE TARGET" match GET if
  // GET came first in the table. It's 1983; embrace it.
  for (const v of VOCAB.verbs)
    if (input.includes(v.word)) return v.id;
  return null;
}

const inputHas = (input, keyword) => keyword && input.includes(keyword);

function matchObjectKeyword(input, obj) {
  return obj && obj.keys.some((k) => inputHas(input, k));
}

function matchGenericNoun(input) {
  for (const n of VOCAB.nouns)
    if (inputHas(input, n.word)) return n;
  return null;
}

/* ---------------------------------------------------------------------
   8. VERBS — the recovered rules, with the EXE's own words
   --------------------------------------------------------------------- */

function doExamine(input) {
  const here = state.roomId, obj = objectHere();

  if (inputHas(input, "FLOOR") || inputHas(input, "GROUND")) {
    // playtest-reconstructed: the bloodstains only show while a
    // keen-eyed guest is staring at the floor beside you — the
    // guests ARE the mechanism (SLEUTH.DOC: "pay close attention to
    // the behavior of the guests!"). Red-herring stares elsewhere
    // resolve to the nearsighted line.
    const witness = world.suspects.some(
      (s) => s.room === locOf(here) && s.staring);
    if (here === world.murderRoom && witness) {
      world.sceneFound = true;
      say("There seem to be bloodstains on the floor!  This must be the " +
          "scene of the murder!", 0x0c);          // in blood red
    } else if (witness) {
      // a herring resolved: someone IS staring, but this floor is clean
      say("There's nothing unusual about the floor.");
    } else {
      say("I can't see anything unusual about the floor.  But then I am " +
          "rather nearsighted.");
    }
    return;
  }

  const glassReply = () => {
    if (world.hasGlass || here === world.glassRoom)
      say("It looks as though it might prove useful for your investigation.");
    else say("Perhaps I just don't understand what you're looking for, but " +
             "I don't see anything like that around here.");
  };
  if (inputHas(input, "MAGNIF")) { glassReply(); return; }

  // the room's scripted examinables (from DESCR) come before weapons —
  // "EXAMINE SILVER" in the dining room is scenery, not evidence.
  // Bare "GLASS" is checked only AFTER objects: the hourglass taught
  // us that substring parsers bite their makers.
  const room = house().rooms[String(here)];
  if (room) {
    for (const ex of room.examinables || []) {
      if (inputHas(input, ex.keyword)) { say(ex.response); return; }
    }
  }

  if (matchObjectKeyword(input, obj)) {
    if (world.weaponKnown) {
      say("You've already found the murder weapon, so there's not much " +
          "point in snooping around for the weapon anymore.");
    } else if (!world.hasGlass) {
      say("It doesn't look like the murder weapon to me.  Of course, " +
          "without the magnifying glass it's hard for me to be certain.");
    } else if (here === world.weaponRoom) {
      world.weaponKnown = true;
      obj.examined = true;
      say("There are traces of blood on it!  This must be the murder weapon!",
          0x0c);                                   // in blood red
    } else {
      obj.examined = true;
      // the WEAPN record's own text already says its piece —
      // prepending our line had it saying "nothing unusual" twice
      say(obj.examine || `There's nothing unusual about the ${obj.name}.`);
    }
    return;
  }

  if (inputHas(input, "GLASS")) { glassReply(); return; }

  const noun = matchGenericNoun(input);
  if (noun) {
    const resp = VOCAB.noun_responses[noun.id - 1];
    const a = resp ? resp.examine_response : noun.word.toLowerCase() + ".";
    // SUNDRIES stores fragments ("floor.") for composition and full
    // sentences (chairs/room/house) to speak verbatim
    say(/^[a-z]/.test(a)
        ? "I don't see much of anything unusual about the " + a
        : a);
    return;
  }
  if (!obj && !(room && (room.examinables || []).length))
    say("But there's nothing around here to examine!");
  else
    say("Perhaps I just don't understand what you're looking for, but I " +
        "don't see anything like that around here.");
}

function doTake(input) {
  const here = state.roomId, obj = objectHere();

  const glassTake = () => {
    if (world.hasGlass)
      say("You are already carrying the magnifying glass.");
    else if (here === world.glassRoom) {
      world.hasGlass = true; world.glassRoom = null;
      say("You are now carrying the magnifying glass.");
    } else
      say("Perhaps I just don't understand what you're trying to get, but " +
          "I don't see anything like that around here.");
  };
  if (inputHas(input, "MAGNIF")) { glassTake(); return; }

  // generic nouns get the SUNDRIES canned refusals:
  // "You can't take the floor no matter how hard you try!"
  const noun = matchGenericNoun(input);
  if (noun) {
    const resp = VOCAB.noun_responses[noun.id - 1];
    say(resp ? resp.take_response : "Don't be ridiculous!");
    return;
  }

  if (matchObjectKeyword(input, obj)) {
    if (world.carrying)
      say("You're already carrying the murder weapon, so there's not much " +
          "point in taking anything else.");
    else if (here === world.weaponRoom && world.weaponKnown) {
      world.carrying = obj.name;
      say("You are now carrying the murder weapon.");
      // the murderer notices: your time shortens
      // SLEUTH.DOC: "the murderer is likely to become nervous if you
      // are carrying the evidence around with you" — pocketing the
      // weapon pulls both threat thresholds sharply closer
      world.suspAt = Math.min(world.suspAt, world.turn + 40);
      world.stalkAt = Math.min(world.stalkAt, world.turn + 120);
    } else if (!obj.examined && !world.weaponKnown)
      say("You really should examine the object carefully with a " +
          "magnifying glass before you try to take it.");
    else
      say("It's not the murder weapon, so there's not much point in " +
          "taking it.");
    return;
  }

  if (inputHas(input, "GLASS")) { glassTake(); return; }
  if (!obj) say("But there's nothing around here to take!");
  else say("Perhaps I just don't understand what you're trying to get, " +
           "but I don't see anything like that around here.");
}

function doDrop(input) {
  const carriedObj = world.carrying && world.objects[world.weaponRoom];
  if ((inputHas(input, "MAGNIF")) ||
      (inputHas(input, "GLASS") && !(carriedObj &&
        matchObjectKeyword(input, carriedObj)))) {
    if (world.hasGlass)
      say("Why in the world would you want to drop the only useful tool " +
          "in the house!");
    else say("You aren't carrying anything like that!");
    return;
  }
  if (world.carrying && matchObjectKeyword(input, world.objects[world.weaponRoom])) {
    // the original's answer to inventory management: staff
    say(`In the wink of an eye a rogue footman rushes up behind you, ` +
        `catches the ${world.carrying} as it falls, and soundlessly ` +
        `disappears.`);
    world.carrying = null;   // the footman returns it whence it came
    return;
  }
  say("You aren't carrying anything like that!");
}

/* ---------------------------------------------------------------------
   8b. QUESTION / ALIBI — verb 2 (both words share the id in SUNDRIES)
   ---------------------------------------------------------------------
   Delivery is assembled from the recovered pools:
     framing (ALIBI1, ends with an opening quote) + statement
     [+ elaboration (ALIBI2), with # -> victim and @ -> another guest]
   Repeat questions get a repeat prefix inside the quote; moody
   guests sometimes refuse outright; and — per the "can't hear you"
   string — you must actually walk up to someone to question them. */

const DIALOGUE = window.SLEUTH_DIALOGUE;

function seatOf(suspect) {
  return house().anchors[String(suspect.room)] || middleCell(suspect.room);
}

function fillTokens(text, speaker) {
  const others = world.suspects.filter((s) => s.key !== speaker.key);
  const scapegoat = pick(others).nick;
  // names were painted over a 10-char token; when the token abuts a
  // word ("@+++++++++is"), restore the space the padding provided
  return text
    .replace(/#\+{9}(?=[A-Za-z])/g, world.victim.nick + " ")
    .replace(/#\+{9}/g, world.victim.nick)
    .replace(/@\+{9}(?=[A-Za-z])/g, scapegoat + " ")
    .replace(/@\+{9}/g, scapegoat);
}

function doQuestion(input) {
  // single occupancy means at most one guest can be here — QUESTION
  // is never ambiguous, just as in the original
  const here = world.suspects.filter((s) => s.room === locOf(state.roomId));
  if (!here.length) { say("But there's nobody here!"); return; }
  const named = world.suspects.find((s) => matchSuspect(input, s));
  if (named && named.room !== locOf(state.roomId)) {
    say(`${named.nick} is not in this room.`);
    return;
  }
  const target = named || here[0];

  const seat = seatOf(target);
  const dist = Math.max(Math.abs(seat[0] - state.row),
                        Math.abs(seat[1] - state.col));
  if (dist > 3) {
    say(`${target.nick} can't hear you from all the way over there.`);
    return;
  }

  tick();                                   // questioning takes a turn
  if (rng() < 0.2) {                        // moody, as advertised
    say(`${target.nick} ${pick(DIALOGUE.refusals)}`);
    redraw();
    return;
  }

  const a = world.alibis[target.key];
  const framing = pick(DIALOGUE.framings);
  if (a.told) {
    say(`${target.nick} ${framing}${pick(DIALOGUE.repeats)} ` +
        `${alibiStatement(a)}"`);
  } else {
    a.told = true;
    let line = `${target.nick} ${framing}${alibiStatement(a)}`;
    if (rng() < 0.45) {                     // sometimes they elaborate
      const pool = a.withName ? DIALOGUE.elab_together.concat(DIALOGUE.elab_general)
                              : DIALOGUE.elab_alone.concat(DIALOGUE.elab_general);
      line += "  " + fillTokens(pick(pool), target);
    } else {
      line += '"';
    }
    say(line);
  }
  redraw();
}

function doGather() {
  if (world.gathered) {
    say("Everyone is waiting with baited breath to hear your accusation!");
    return;
  }
  if (!world.carrying) {
    say("But you haven't even found the murder weapon!");
    return;
  }
  const loc = locOf(state.roomId);
  if (!NPC_LOCATIONS.includes(loc)) {
    say("I'll give you a hint -- This is not the scene of the murder!");
    return;
  }
  for (const s of world.suspects) {
    s.room = loc;
    s.action = idleAction(loc);    // M8.4c: fresh pastime on reseat
  }
  world.gathered = true;
  world.gatherRoom = loc;
  // seat the assembly in a U around the room's anchor, opening toward
  // the detective (as the original arranges them)
  const base = house().anchors[String(loc)] || middleCell(loc);
  const U = [[1,-3],[1,-1],[1,1],[1,3],[0,-3],[0,3],[1,-2],[1,2],[0,-2],[0,2]];
  const g2 = house().grid, taken = new Set();
  world.gatherSeats = {};
  for (const s of world.suspects) {
    let seat = null;
    for (const [dr, dc] of U) {
      const rr = base[0] + dr, cc = base[1] + dc, k = rr + "," + cc;
      if (g2[rr] && g2[rr][cc] === loc && !taken.has(k)) { seat = [rr, cc]; break; }
    }
    if (!seat) {                            // odd-shaped room: any cell
      outer: for (let rr = 0; rr < g2.length; rr++)
        for (let cc = 0; cc < g2[0].length; cc++)
          if (g2[rr][cc] === loc && !taken.has(rr + "," + cc)) { seat = [rr, cc]; break outer; }
    }
    if (seat) { taken.add(seat.join()); world.gatherSeats[s.key] = seat; }
  }
  freshLog();
  say("One by one, the houseguests file in. Everyone is waiting with " +
      "baited breath to hear your accusation!  The door is now locked.");
  redraw();
}

// the full ladder recovered from the EXE's string table:
// Bumbling / Novice! / Apprentice / Professional / Master / Holmesian.
// Thresholds are compiled-in originals we cannot read; ours are
// calibrated against measured bot playthroughs (see README).
// Calibrated against measured bot playthroughs (optimal pathing,
// full interviews: 260-431 turns; humans path ~1.5x worse):
const RANKS = [
  [200, "Holmesian"], [280, "Master"], [380, "Professional"],
  [500, "an Apprentice"], [650, "Novice"],
];
function rankFor(turns) {
  for (const [max, name] of RANKS) if (turns <= max) return name;
  return "Bumbling";
}

function doAccuse(input) {
  if (!world.gathered) {
    say("But you haven't even gathered all of the suspects together yet!");
    return;
  }
  const accused = world.suspects.find((s) => matchSuspect(input, s));
  if (!accused) {
    say("You must ACCUSE one of the six people in the room:  I'm not " +
        "sure who it is that you're trying to accuse.");
    return;
  }
  const m = murdererS(), w = weaponName(), v = world.victim.nick;
  const here = locOf(state.roomId);

  if (accused.key !== m.key) {
    playTune(SOUNDS.fail);
    if (here === world.murderRoom) {
      // right room, wrong person: the murderer can't resist revealing
      // themselves ("-right room, but I was the one who used the" — EXE)
      say(`${m.nick} rises and declares angrily, "You're wrong!!  ` +
          `You've got the right room, but I was the one who used the ` +
          `${w} to kill ${v}!"`);
    } else {
      // wrong room, wrong person: the slipshod ending
      // (",.Very slipshod of you inspector." — EXE)
      say(`Very slipshod of you inspector.  ${fullName(m)} murdered ` +
          `${fullName(world.victim)}.  And the murder was committed in ` +
          `the ${roomName(world.murderRoom)}, not in the ${roomName(here)}.`);
    }
    gameOver("lost");
    return;
  }
  if (here !== world.murderRoom) {           // right villain, wrong room
    playTune(SOUNDS.fail);
    say(`${fullName(m)} stands up and exclaims, "You fool!!  Yes, I ` +
        `used the ${w} to get rid of ${v}.  But I did it in the ` +
        `${roomName(world.murderRoom)}, not here in the ` +
        `${roomName(here)}!"`);
    gameOver("lost");
    return;
  }
  if (!world.carrying) {                     // right room, empty hands
    playTune(SOUNDS.fail);
    say(`${m.nick} rises and declares angrily, "You're wrong!!  ` +
        `You've got the right room, but I was the one who used the ` +
        `${w}."`);
    say("Very slipshod of you inspector.");
    gameOver("lost");
    return;
  }
  // person, room, weapon: the confession
  playTune(SOUNDS.win);
  const conf = fillTokens(pick(DIALOGUE.confessions), m);
  // some templates begin ", grinning malevolently." — join tightly
  say(fullName(m) + (conf.startsWith(",") ? "" : " ") + conf);
  const rank = rankFor(world.turn);
  say(`The case is closed after ${world.turn} moves.  You now rank ` +
      `as ${rank.startsWith("an ") ? rank : "a " + rank} Sleuth.`);
  gameOver("won");
}

function doHelp() {
  say("To move around the house use the four arrow keys.  Objects can " +
      "be EXAMINED and TAKEN.  You can QUESTION people or ask them for " +
      "an ALIBI.  When you have solved the crime, pick up the murder " +
      "weapon, move to the murder room, ASSEMBLE the suspects, and " +
      "ACCUSE the guilty party.  Good Luck!");
  say("(All original verbs are live. RESTART replays this house; RANDOM " +
      "deals a new one. C cycles the colour schemes and TAB switches " +
      "houses when the command line is empty.)");
}

function execute(raw) {
  const input = raw.trim().toUpperCase();
  if (!input) return;
  if (input === "RANDOM" || input.startsWith("RANDOM ")) {
    const n = window.SLEUTH_HOUSES.length;
    state.houseIdx = (state.houseIdx + 1 + Math.floor(rng() * (n - 1))) % n;
    ui.houseIdx = state.houseIdx;
    freshLog();
    scatter();
    spawn(false);
    return;
  }
  const verb = matchVerb(input);
  if (world.over && verb !== 9 && verb !== 6) {
    freshLog();
    say("The case is closed.  You may QUIT to the menu or RESTART.");
    return;
  }
  freshLog();                            // each command starts clean
  switch (verb) {
    case 1: doExamine(input); break;          // EXAMINE / LOOK / SEARCH
    case 3: doTake(input); break;             // GET / TAKE / PICK
    case 8: doDrop(input); break;             // DROP / PUT
    case 5: doHelp(); break;                  // HELP
    case 9:                                   // RESTART
      SEED = Math.floor(rng() * 1e6); rng = mulberry32(SEED);
      spawn(true); break;
    case 13: {                                // LIST the houseguests
      if (world.gathered)
        say("You must ACCUSE one of the six people in the room:");
      else
        say(`The houseguests now lurking about the ` +
            `${world.victim.last || world.victim.nick} estate are:`);
      for (let i = 0; i < world.suspects.length; i += 3)
        say(world.suspects.slice(i, i + 3)
              .map((s) => fullName(s).padEnd(24)).join("").trimEnd());
      if (world.gathered)
        say("Everyone is waiting with baited breath to hear your " +
            "accusation!");
      break;
    }
    case 12:                                  // KNOCK
      say("There's no need to observe common courtesies in this house.");
      break;
    case 2: doQuestion(input); break;         // QUESTION / ALIBI / Q
    case 4: doGather(); break;                // GATHER / ASSEMBLE
    case 7: doAccuse(input); break;           // ACCUSE
    case 6: uiEnter("menu"); break;           // QUIT: back to the menu
    default:
      say("I'm sorry, but I can't seem to make out what you're trying " +
          "to say.");
  }
  redraw();
}

/* ---------------------------------------------------------------------
   9. CHROME — status, room-name line, command line, redraw
   --------------------------------------------------------------------- */

let typed = "";          // the command being typed

function redraw() {
  clearRow(0, 0x70);
  print(0, 1, "SLEUTH", 0x70);
  print(0, 11, house().label.slice(0, 42), 0x70);
  const keys = "\u2190\u2191\u2193\u2192 \u00b7 TAB \u00b7 C \u00b7 \u23ce";
  print(0, COLS - keys.length - 1, keys, 0x70);
  const seedTag = `seed ${SEED}`;        // right-aligned before the keys
  print(0, COLS - keys.length - seedTag.length - 4, seedTag, 0x70);
  put(0, COLS - 1, " ", 0x00);           // 80th column: the black margin
                                         // of the 1983 screen (M8.4b)

  drawHouse();

  // houseguests: cyan smileys at the room's anchor seats (the
  // coordinate table recovered from RMDEF's tail) — and, exactly as
  // in the original, only the guests in YOUR room are visible
  // guests draw on the RIGHT character of the cell (the detective
  // takes the left), so both can share a square without overlap —
  // exactly as the original composes them
  for (const s of world.suspects) {
    if (!guestVisible(s)) continue;
    const pos = guestPos(s);
    const [ar, ac] = pos;
    if (ar <= 16)
      put(ar + SPRITE_TOP, ac * 2, "\u263b", bgAt(ar, ac) | 0x0b);
  }
  // the locked door, drawn shut while the assembly waits. A door in a
  // VERTICAL wall is a one-char gap on the cell's left column; a door
  // in a HORIZONTAL wall is the cell's whole two-char gap — so the
  // seal glyph and its width follow the wall (M8.4b, Brindle Manor:
  // "|" in a horizontal wall looked like a toothpick in a doorway).
  if (world.gathered) {
    const g3 = house().grid, dv = world.gatherRoom + 20;
    for (let rr = 0; rr < g3.length; rr++)
      for (let cc = 0; cc < g3[0].length; cc++)
        if (g3[rr][cc] === dv && rr <= 16) {
          const wallL = cc > 0 && g3[rr][cc - 1] === 0;
          const wallR = cc < 39 && g3[rr][cc + 1] === 0;
          if (wallL || wallR) {                    // horizontal wall run
            put(rr + SPRITE_TOP, Math.max(0, cc * 2 - 1), "\u2500", 0x0f);
            put(rr + SPRITE_TOP, cc * 2, "\u2500", 0x0f);
          } else {                                 // vertical wall run
            put(rr + SPRITE_TOP, Math.max(0, cc * 2 - 1), "\u2502", 0x0f);
          }
        }
  }

  // you are the yellow smiley (CP437 0x02, drawn bright yellow) —
  // invisible while lost in the blind corridor
  // the BSAVE draws each cell's visuals at columns 2c-1..2c with the
  // wall line on the LEFT char, so sprites sit at 2c-1 to read as
  // standing in doorways rather than one unit right of them
  clearRow(18, 0x07);   // the outdoor sprite strip: repaint each frame,
                        // or lawn walks leave a trail of smiley ghosts
  // the outdoor strip (grid row 16) lies below the drawn map but IS
  // playable — the original shows you walking the lawn there
  if (!world.blind && state.row <= 16)
    put(state.row + SPRITE_TOP, Math.max(0, state.col * 2 - 1), "\u263b",
        bgAt(state.row, state.col) | 0x0e);

  clearRow(19, 0x07);
  const room = house().rooms[String(state.roomId)];
  let label = room ? room.name.toUpperCase() : SCHEMES[state.schemeIdx].name;
  print(19, 1, label, 0x0f);
  // inventory readout, right-aligned on the room-name line
  const inv = [world.hasGlass ? "glass" : null, world.carrying]
    .filter(Boolean).join(" + ");
  if (inv) print(19, COLS - inv.length - 22, "carrying: " + inv, 0x08);
  const t = `turn ${world.turn}`;
  print(19, COLS - t.length - 1, t, 0x08);

  // command line, row 24
  clearRow(24, 0x07);
  print(24, 1, "> " + typed + "_", 0x0a);

  say("");   // repaint the log rows + present the frame
}

/* ---------------------------------------------------------------------
   10. INPUT — movement keys plus a line editor
   ---------------------------------------------------------------------
   Letters build a command on row 24; Enter executes it; Backspace
   edits; Escape clears. Tab (house) and C (colours) only act when the
   command line is empty — otherwise "c" is just a letter. */

/* The three sounds, reverse-engineered from recordings of the
   original via pitch-tracking: the passage exit is a rising octave
   glissando (100->200 Hz over ~2.1s); a correct accusation is a C-C-C
   -G fanfare; a wrong one is three low buzzes sagging to a long
   deeper one. Square waves, as the PC speaker intended. */
const SOUNDS = {
  // the glissando ends with a two-note "beep boop" coda — it was in
  // the pitch track all along: (596 Hz, ~130ms), (400 Hz, ~160ms)
  passage: { sweep: [100, 200], ms: 2000,
             then: [[0, 60], [596, 130], [0, 30], [400, 160]] },
  win:  [[523, 150], [0, 110], [523, 150], [0, 110], [523, 80], [0, 90],
         [784, 600]],
  fail: [[131, 310], [0, 90], [131, 310], [0, 90], [131, 310], [0, 90],
         [104, 1000]],
};

function playTune(seq) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const gain = ctx.createGain();
    gain.gain.value = 0.07;
    gain.connect(ctx.destination);
    let t = ctx.currentTime;
    const notes = (list) => {
      for (const [f, ms] of list) {
        if (f > 0) {
          const o = ctx.createOscillator();
          o.type = "square";
          o.frequency.value = f;
          o.connect(gain); o.start(t); o.stop(t + ms / 1000);
        }
        t += ms / 1000;
      }
    };
    if (seq.sweep) {
      const o = ctx.createOscillator();
      o.type = "square";
      o.frequency.setValueAtTime(seq.sweep[0], t);
      o.frequency.linearRampToValueAtTime(seq.sweep[1], t + seq.ms / 1000);
      o.connect(gain); o.start(t); o.stop(t + seq.ms / 1000);
      t += seq.ms / 1000;
      if (seq.then) notes(seq.then);
      return;
    }
    notes(seq);
  } catch (_) { /* no audio device: 1983 in silence */ }
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = "square"; osc.frequency.value = 660;   // PC-speaker-ish
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (_) { /* no audio device: the corridor stays silent */ }
}

const KEY_HANDLER = (e) => {
  const k = e.key;
  if (ui.mode !== "game") {              // title / menu / names / etc.
    uiKey(k);
    e.preventDefault();
    return;
  }
  if (pending.length) {                  // -- MORE --: any key pages on
    freshLines = 0;
    pump();
    e.preventDefault();
    return;
  }
  freshLines = 0;                        // player acted: screen is read
  if (world.blind) {                     // any key: the drop
    if (k.length === 1 && /[a-z]/i.test(k))
      say("No talking is allowed in this corridor.");
    playTune(SOUNDS.passage);
    world.blind = false;
    const g = house().grid, cells = [];
    for (let r = 0; r < g.length; r++)
      for (let c = 0; c < g[0].length; c++)
        if (GUEST_ROOMS.includes(g[r][c])) cells.push([r, c]);
    const prevLoc = locOf(state.roomId);
    [state.row, state.col] = pick(cells);
    state.roomId = null;                 // force a fresh room announce
    freshLog();
    tick();
    if (checkAmbush(prevLoc)) { e.preventDefault(); return; }
    describeCell(false);
    redraw();
    e.preventDefault();
    return;
  }
  if (k === "ArrowUp")        { tryMove(-1, 0); }
  else if (k === "ArrowDown") { tryMove(1, 0); }
  else if (k === "ArrowLeft") { tryMove(0, -1); }
  else if (k === "ArrowRight"){ tryMove(0, 1); }
  else if (k === "Enter")     { const cmd = typed; typed = ""; execute(cmd); }
  else if (k === "Backspace") { typed = typed.slice(0, -1); redraw(); }
  else if (k === "Escape")    { typed = ""; redraw(); }
  else if (k === "Tab" && typed === "") {
    state.houseIdx = (state.houseIdx + 1) % window.SLEUTH_HOUSES.length;
    spawn(true);
  }
  else if ((k === "c" || k === "C") && typed === "") {
    state.schemeIdx = (state.schemeIdx + 1) % SCHEMES.length;
    redraw();
  }
  else if (k.length === 1 && typed.length < 60) { typed += k; redraw(); }
  else return;
  e.preventDefault();
};

/* ---------------------------------------------------------------------
   11. CUSTOM HOUSES — registerSleuthHouse(spec)
   ---------------------------------------------------------------------
   Authoring format (see HOUSES.md): an ASCII map plus a legend, rooms,
   a cast of seven, and weapons grouped by room. Everything optional is
   defaulted; everything structural is validated with a thrown Error,
   because a clear message now beats a silent haunting later. */

window.registerSleuthHouse = function (spec) {
  const fail = (m) => { throw new Error("registerSleuthHouse: " + m); };
  let grid;
  if (spec.grid) {                      // built form (workshop drafts)
    if (!Array.isArray(spec.grid) || spec.grid.length !== 17 ||
        spec.grid.some((row) => !Array.isArray(row) || row.length !== 40))
      fail("grid must be 17 rows of exactly 40 integers");
    grid = spec.grid.map((row) => row.slice());
  } else {                              // authored form (map + legend)
    if (!spec.map || spec.map.length !== 17 ||
        spec.map.some((row) => row.length !== 40))
      fail("map must be 17 rows of exactly 40 characters");
    grid = spec.map.map((row) => [...row].map((ch) => {
      if (!(ch in spec.legend)) fail(`map character '${ch}' missing from legend`);
      return spec.legend[ch];
    }));
  }
  if (!spec.characters || spec.characters.length < 7)
    fail("need at least 7 characters (six suspects + one victim)");
  const guestRooms = [...new Set((spec.weapons || []).map((w) => w.room))];
  if (guestRooms.length < 6)
    fail("need weapons in at least 6 distinct rooms (one guest per room)");
  for (const rid of guestRooms) {
    if (!spec.rooms[rid]) fail(`room ${rid} holds weapons but has no entry in rooms{}`);
    if (!grid.some((row) => row.includes(rid))) fail(`room ${rid} does not appear on the map`);
  }
  // reachability via the shared core (M8.3): this was the last private
  // copy of the flood, still blind to the 32<->33 landing teleport —
  // a custom house with V1-style detached flights would have failed
  // here as "more than one unreachable room"
  const { reachable } = computeAnalysis(grid, spec.weapons || []);
  const sealed = guestRooms.filter((rid) => {
    for (let r = 0; r < 17; r++) for (let c = 0; c < 40; c++)
      if (grid[r][c] === rid) return !reachable.has(r + "," + c);
    return false;
  });
  if (sealed.length > 1) fail("more than one unreachable room: " + sealed.join(","));
  if (sealed.length === 1) {
    const S = sealed[0];
    const ok = grid.some((row, r) => row.some((v, c) =>
      v === 0 && grid[r + 1] && grid[r + 1][c] === S &&
      grid[r - 1] && grid[r - 1][c] > 0 && grid[r - 1][c] !== S));
    if (!ok) fail(`sealed room ${S} has no room above it for a secret panel`);
  }
  for (const rid of Object.keys(spec.rooms))
    spec.rooms[rid] = { id: Number(rid), name: "", description: "",
                        entry_description: "", examinables: [],
                        ...spec.rooms[rid] };
  window.SLEUTH_HOUSES.push({
    label: spec.label || "Custom house",
    variant: "custom",
    rooms: spec.rooms,
    grid,
    weapons: spec.weapons,
    characters: spec.characters,
    anchors: spec.anchors || {},
    landing_actions: spec.landing_actions || [],
    screen: null,                      // synthesised on first draw
  });
};

/* ---------------------------------------------------------------------
   12. THE 1983 PRESENTATION LAYER — title, menu, names, instructions
   ---------------------------------------------------------------------
   Modelled on the original's opening flow (title card over the house
   map, an options menu, Personalized Sleuth name entry, the
   instruction pages from SLEUTH.DOC) with the remaster twist the user
   designed: every configuration lives on ONE startup screen, values
   shown in place. The seed option is period-authentic — the original
   EXE prompts for a "Random Number Seed". */

const ui = {
  mode: "boot",             // title | menu | names | instructions | loading | game

const BIGFONT = {           // 5-row block font for the title letters
  S: ["████", "█   ", "████", "   █", "████"],
  L: ["█   ", "█   ", "█   ", "█   ", "████"],
  E: ["████", "█   ", "███ ", "█   ", "████"],
  U: ["█  █", "█  █", "█  █", "█  █", "████"],
  T: ["████", " █  ", " █  ", " █  ", " █  "],
  H: ["█  █", "█  █", "████", "█  █", "█  █"],
};

function clearScreen(attr) {
  for (let r = 0; r < ROWS; r++) clearRow(r, attr ?? 0x07);
}

function centre(row, text, attr) {
  print(row, Math.max(0, Math.floor((COLS - text.length) / 2)), text, attr);
}

function drawTitle() {
  clearScreen(0x07);
  // the house map as the backdrop, exactly as the original does
  if (!house().screen) house().screen = synthesizeScreen(house().grid);
  const scr = house().screen, pal = scr.palettes[SCHEMES[state.schemeIdx].key];
  for (let r = 0; r < scr.chars.length; r++)
    for (let c = 0; c < COLS; c++)
      put(r + 1, c, scr.chars[r][c], parseInt(pal[r].substr(c * 2, 2), 16));
  // the credits card: covers the RIGHT HALF of the house exactly
  // (rows 1-17 x cols 40-79), boxed
  const L = 40, R2 = 79, T = 1, B = 17;
  for (let r = T; r <= B; r++)
    for (let c = L; c <= R2; c++) put(r, c, " ", 0x07);
  for (let c = L + 1; c < R2; c++) { put(T, c, "─", 0x0f); put(B, c, "─", 0x0f); }
  for (let r = T + 1; r < B; r++) { put(r, L, "│", 0x0f); put(r, R2, "│", 0x0f); }
  put(T, L, "┌", 0x0f); put(T, R2, "┐", 0x0f);
  put(B, L, "└", 0x0f); put(B, R2, "┘", 0x0f);
  const card = (row, text, attr) =>
    print(row, L + 1 + Math.max(0, Math.floor((R2 - L - 1 - text.length) / 2)),
          text, attr);
  card(3,  "SLEUTH  ·  remastered", 0x0f);
  card(6,  "Original game (C) 1983", 0x07);
  card(7,  "Eric N. Miller · Norland Software", 0x0b);
  card(9,  "Remaster code: Claude (Anthropic)", 0x07);
  card(10, "Design & playtest archaeology: Jeromai", 0x07);
  card(12, "You are encouraged to copy and", 0x07);
  card(13, "share this program with others.", 0x07);
  card(15, " PRESS ANY KEY TO BEGIN THE GAME ", 0x70);
  // the giant letters, red, one blank row below the house
  const word = "SLEUTH", lw = 4, gap = 2, tot = word.length * (lw + gap) * 2 - gap * 2;
  let x = Math.floor((COLS - tot) / 2);
  for (const ch of word) {
    const glyph = BIGFONT[ch];
    for (let r = 0; r < 5; r++)
      for (let c = 0; c < lw; c++)
        if (glyph[r][c] === "█") {
          put(19 + r, x + c * 2, "▒", 0x0c);
          put(19 + r, x + c * 2 + 1, "▒", 0x0c);
        }
    x += (lw + gap) * 2;
  }
  render();
}

function menuHouseLabel() {
  // strip the "House N · " prefix and clamp: the value column must
  // not collide with the guest-list panel at col 48
  return window.SLEUTH_HOUSES[ui.houseIdx].label
    .replace(/^House \d+ \u00b7 /, "").slice(0, 17);
}

function menuCast() {
  if (ui.customCast) return ui.customCast;
  return window.SLEUTH_HOUSES[ui.houseIdx].characters.slice(0, 7)
    .map((p) => ({ ...p, nick: p.first }));
}

function drawMenu() {
  clearScreen(0x07);

  print(13, left, "(S) Suspects:", 0x07);
